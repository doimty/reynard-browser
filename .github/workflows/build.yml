name: Build Reynard

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: 'Xcode version (e.g. 16.2, 26.4.1)'
        required: false
        default: ''
        type: string
      publish_release:
        description: 'Publish packages to a GitHub Release'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag, for example 0.4.0-cn.1'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a pre-release'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - '*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build IPA packages
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Initialize lightweight submodules
        run: |
          git submodule sync -- support/idevice engine/firefox
          git submodule update --init --depth 1 --recursive support/idevice

      - name: Debug - List available Xcode versions
        run: |
          echo "=== Available Xcode installations ==="
          ls -la /Applications/ | grep -i xcode || echo "No Xcode dirs found"
          echo ""
          echo "=== Current xcode-select path ==="
          xcode-select -p
          echo ""
          echo "=== Available SDK versions ==="
          xcodebuild -showsdks || true

      - name: Select Xcode
        run: |
          if [ -n "${{ github.event.inputs.xcode_version }}" ]; then
            XCODE_VERSION="${{ github.event.inputs.xcode_version }}"
            XCODE_PATH="/Applications/Xcode_${XCODE_VERSION}.app"
            if [ -d "$XCODE_PATH" ]; then
              echo "Selecting Xcode $XCODE_VERSION at $XCODE_PATH"
              sudo xcode-select -s "$XCODE_PATH"
            else
              echo "Warning: Xcode $XCODE_VERSION not found at $XCODE_PATH, using default"
              sudo xcode-select -s /Applications/Xcode.app
            fi
          else
            echo "Using default Xcode"
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Install dependencies
        run: |
          brew update
          if brew info autoconf@2.13 >/dev/null 2>&1; then
            brew install autoconf@2.13 ccache ldid nasm pkg-config rustup yasm
          else
            echo "autoconf@2.13 is unavailable on this Homebrew runner; falling back to autoconf"
            brew install autoconf ccache ldid nasm pkg-config rustup yasm
          fi

          BREW_RUSTUP_BIN="$(brew --prefix rustup)/bin"
          echo "$BREW_RUSTUP_BIN" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          export PATH="$BREW_RUSTUP_BIN:$HOME/.cargo/bin:$PATH"
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          fi

      - name: Configure Rust
        run: |
          export PATH="$(brew --prefix rustup)/bin:$HOME/.cargo/bin:$PATH"
          rustup default stable
          rustup target add aarch64-apple-ios

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('support/idevice/ffi/Cargo.lock', 'support/idevice/ffi/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Prepare Gecko source
        run: |
          ./tools/development/update-gecko.sh
          ./tools/development/apply-patches.sh

      - name: Cache Gecko build state
        uses: actions/cache@v4
        with:
          path: |
            engine/firefox/obj-*
            ~/.mozbuild
          key: ${{ runner.os }}-gecko-${{ hashFiles('engine/release.txt', 'patches/**/*.patch', 'tools/development/build-gecko.sh') }}
          restore-keys: |
            ${{ runner.os }}-gecko-

      - name: Build idevice helper library
        run: |
          export PATH="$(brew --prefix rustup)/bin:$HOME/.cargo/bin:$PATH"
          ./tools/development/build-idevice.sh

      - name: Build Gecko engine
        run: |
          export PATH="$(brew --prefix rustup)/bin:$HOME/.cargo/bin:$PATH"
          ./tools/development/build-gecko.sh

      - name: Resolve package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Package version: $VERSION"

      - name: Archive Reynard app
        env:
          XCODEBUILD_EXTRA_ARGS: >-
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGN_IDENTITY=-
            AD_HOC_CODE_SIGNING_ALLOWED=YES
        run: |
          ./tools/release/build-app.sh

      - name: Create IPA packages
        run: |
          ./tools/release/create-ipa.sh
          ls -lh dist/*.ipa dist/*.tipa

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-${{ env.VERSION }}
          path: |
            dist/Reynard.ipa
            dist/Reynard-TrollStore.tipa
            dist/Reynard-Jailbroken.ipa
          if-no-files-found: error

      - name: Attach packages to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Reynard.ipa
            dist/Reynard-TrollStore.tipa
            dist/Reynard-Jailbroken.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages to requested release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/Reynard.ipa
            dist/Reynard-TrollStore.tipa
            dist/Reynard-Jailbroken.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
